name: Build Vite and deploy to Hostinger

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build Vite
        run: |
          npm run build
          test -f public/build/manifest.json

      - name: Ensure remote build dir exists
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          timeout: 60s
          command_timeout: 2m
          script: |
            mkdir -p "${{ secrets.HOSTINGER_APP_PATH }}/public/build"

      - name: Upload Vite build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          source: "public/build/*"
          target: "${{ secrets.HOSTINGER_APP_PATH }}/public/build"
          strip_components: 2
          timeout: 60s

      - name: Clear Laravel caches
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          timeout: 60s
          command_timeout: 2m
          script: |
            cd "${{ secrets.HOSTINGER_APP_PATH }}"
            php artisan optimize:clear
            ls -la public/build/manifest.json